<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA fallback for GitHub Pages: redirect all 404s to index.html
    // preserving the path so the client-side router can handle it
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace('/' + '?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
